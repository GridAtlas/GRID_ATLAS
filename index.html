<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#020806">
    <title>GRID ATLAS</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon-retro.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon-retro.png">
    <script>try{document.documentElement.dataset.theme=localStorage.getItem("grid-atlas-theme")==="light"?"light":"retro";document.documentElement.lang=localStorage.getItem("grid-atlas-language")==="en"?"en":"ja"}catch{document.documentElement.dataset.theme="retro"}</script>
    <link rel="stylesheet" href="src/styles.css?v=35">
    <script src="src/main.js?v=93" type="module" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-main">
          <div class="brand">
            <span class="brand-dot" aria-hidden="true"></span>
            <h1>GRID ATLAS</h1>
            <span id="editionBadge" class="theme-toggle edition-badge" data-i18n="edition.web">WEB版</span>
          </div>
          <div class="settings-menu" id="settingsMenu">
            <button id="settingsMenuButton" class="settings-menu-button" type="button" aria-expanded="false" aria-controls="settingsPanel" title="設定">☰</button>
            <div id="settingsPanel" class="settings-panel" hidden>
              <div class="settings-nav">
                <span class="settings-nav-title" data-i18n="settings.menu">メニュー</span>
                <button class="settings-nav-button" type="button" data-mobile-page="data" aria-pressed="false" data-i18n="page.data">データ</button>
              </div>
              <h2 data-i18n="settings.title">設定</h2>
              <label>
                <span data-i18n="settings.design">デザイン</span>
                <select id="settingsThemeSelect">
                  <option value="retro" data-i18n="settings.themeRetro">レトロ</option>
                  <option value="light" data-i18n="settings.themeLight">ライト</option>
                </select>
              </label>
              <label>
                <span data-i18n="settings.language">言語</span>
                <select id="settingsLanguageSelect">
                  <option value="ja" data-i18n="settings.languageJa">日本語</option>
                  <option value="en" data-i18n="settings.languageEn">English</option>
                </select>
              </label>
              <label>
                <span data-i18n="settings.units">距離単位</span>
                <select id="settingsUnitSelect">
                  <option value="metric" data-i18n="settings.unitsMetric">km</option>
                  <option value="imperial" data-i18n="settings.unitsImperial">mile</option>
                </select>
              </label>
              <label class="settings-check">
                <input id="settingsRouteReturnToStart" type="checkbox">
                <span data-i18n="settings.routeReturn">巡回で起点に戻る</span>
              </label>
            </div>
          </div>
        </div>


        <div class="selected-summary selected-summary-mobile" aria-live="polite">
          <span data-i18n="summary.selected">選択中</span>
          <strong id="mobileSelectedTitle">未選択</strong>
        </div>
      </header>

      <main class="workspace">
        <div class="map-column is-mobile-page-active">
          <div class="selection-info" aria-live="polite">
            <span data-i18n="summary.info">情報</span>
            <strong id="selectionInfoText">未選択</strong>
          </div>

          <div class="map-content">
            <section class="grid-stage is-mobile-grid-active" data-mobile-grid-panel="grid" aria-label="格子">
              <canvas id="gridCanvas" aria-label="地点格子"></canvas>
              <div class="canvas-tools" aria-label="表示操作">
                <button id="zoomInButton" class="icon-button" type="button" title="拡大">＋</button>
                <button id="zoomOutButton" class="icon-button" type="button" title="縮小">−</button>
                <button id="fitButton" class="icon-button" type="button" title="全体表示">□</button>
                <button id="originButton" class="icon-button" type="button" aria-pressed="false" title="現在地を中央にして画面追従">⌾</button>
              </div>
              <output id="statusLine" class="status-line" aria-live="polite"></output>
            </section>

            <section class="mobile-content-panel" data-mobile-grid-panel="points" aria-label="地点一覧">
              <div class="mobile-content-heading">
                <h2 data-i18n="panel.points">地点一覧</h2>
                <span id="mobilePointCount" class="panel-count">0点</span>
              </div>
              <div id="mobilePointItems" class="mobile-point-items"></div>
            </section>

            <section class="mobile-content-panel" data-mobile-grid-panel="lists" aria-label="リスト一覧">
              <div class="mobile-content-heading">
                <h2 data-i18n="panel.lists">リスト一覧</h2>
              </div>
              <div id="mobilePointListItems" class="point-list-items" data-point-list-items></div>
            </section>
          </div>

          <nav class="actionbar" aria-label="地点操作">
            <button id="actionRegisterButton" class="action-button" type="button" title="この位置を登録" disabled>
              <span aria-hidden="true">＋</span>
              <span data-i18n="action.register">登録</span>
            </button>
            <button id="actionLinkButton" class="action-button" type="button" title="選択中の2点を接続" disabled>
              <span aria-hidden="true">╱</span>
              <span data-i18n="action.connect">接続</span>
            </button>
            <button id="actionCenterButton" class="action-button" type="button" title="選択点の中心に仮ポイントを作成" disabled>
              <span aria-hidden="true">◇</span>
              <span data-i18n="action.center">中心</span>
            </button>
            <button id="clearSelectionButton" class="action-button" type="button" title="選択を解除" disabled>
              <span aria-hidden="true">○</span>
              <span data-i18n="action.clear">解除</span>
            </button>
            <button id="actionRouteStartButton" class="action-button" type="button" title="選択地点を起点にする" disabled>
              <span aria-hidden="true">●</span>
              <span data-i18n="action.start">起点</span>
            </button>
            <button id="actionTargetButton" class="action-button" type="button" title="選択地点を対象にする" disabled>
              <span aria-hidden="true">◎</span>
              <span data-i18n="action.target">対象</span>
            </button>
            <button id="actionFollowButton" class="action-button" type="button" aria-pressed="false" title="現在地追跡を切り替え">
              <span aria-hidden="true">⌾</span>
              <span data-i18n="action.track">追跡</span>
            </button>
            <button id="actionRouteButton" class="action-button" type="button" title="選択点を巡回対象にする" disabled>
              <span aria-hidden="true">⤨</span>
              <span id="actionRouteLabel" data-i18n="action.route">巡回</span>
            </button>
            <button id="deletePointButton" class="action-button danger-button" type="button" title="選択対象を削除" disabled>
              <span aria-hidden="true">×</span>
              <span data-i18n="action.delete">削除</span>
            </button>
            <button id="actionRestoreButton" class="action-button" type="button" title="直前の削除を復旧" disabled>
              <span aria-hidden="true">↶</span>
              <span data-i18n="action.restore">復旧</span>
            </button>
            <button id="actionEditButton" class="action-button" type="button" title="選択地点を編集" disabled>
              <span aria-hidden="true">✎</span>
              <span data-i18n="action.edit">編集</span>
            </button>
            <button id="actionMapButton" class="action-button" type="button" title="選択地点を地図で開く" disabled>
              <span aria-hidden="true">↗</span>
              <span data-i18n="action.map">地図</span>
            </button>
          </nav>
          <nav class="mobile-grid-tabs" aria-label="表示切替">
            <button class="mobile-grid-tab is-active" type="button" data-mobile-grid-page="grid" aria-pressed="true" data-i18n="page.grid">グリッド</button>
            <button class="mobile-grid-tab" type="button" data-mobile-grid-page="points" aria-pressed="false" data-i18n="page.points">地点一覧</button>
            <button class="mobile-grid-tab" type="button" data-mobile-grid-page="lists" aria-pressed="false" data-i18n="page.lists">リスト一覧</button>
          </nav>
        </div>

        <aside class="sidebar" aria-label="地点と分析">
          <div class="selected-summary selected-summary-sidebar" aria-live="polite">
            <span data-i18n="summary.selected">選択中</span>
            <strong id="sidebarSelectedTitle">未選択</strong>
          </div>
          <button id="mobileBackButton" class="mobile-back-button" type="button" data-i18n="button.backToGrid">← 格子に戻る</button>

          <section class="panel is-mobile-active" data-mobile-panel="register">
            <h2 data-i18n="panel.register">地点登録</h2>
            <form id="pointForm" class="point-form">
              <label>
                <span data-i18n="field.title">見出し</span>
                <input id="pointTitle" name="title" type="text" autocomplete="off" maxlength="80">
              </label>

              <div class="coordinate-fields">
                <label>
                  <span data-i18n="field.lat">緯度</span>
                  <input id="pointLat" name="lat" type="number" step="0.000001" inputmode="decimal" placeholder="35.681236">
                </label>
                <label>
                  <span data-i18n="field.lng">経度</span>
                  <input id="pointLng" name="lng" type="number" step="0.000001" inputmode="decimal" placeholder="139.767125">
                </label>
              </div>

              <div class="button-row">
                <button id="readClipboardButton" type="button" data-i18n="button.clipboard">クリップ読取</button>
                <button id="useLocationButton" type="button" aria-pressed="false" title="現在地を登録フォームへ入力" data-i18n="button.currentLocation">現在地</button>
              </div>
              <output id="shareImportStatus" class="form-status" aria-live="polite"></output>

              <label>
                <span data-i18n="field.photo">写真</span>
                <input id="pointPhoto" name="photo" type="file" accept="image/*" capture="environment">
              </label>

              <label>
                <span data-i18n="field.note">コメント</span>
                <textarea id="pointNote" name="note" rows="4"></textarea>
              </label>

              <button id="pointSubmitButton" class="primary-button" type="submit" data-i18n="button.submitRegister">登録</button>
            </form>
          </section>
          <section class="panel" data-mobile-panel="detail">
            <div class="panel-heading">
              <h2 id="selectionHeading">選択地点</h2>
            </div>
            <div id="emptyDetails" class="empty-state" data-i18n="state.unselected">未選択</div>
            <div id="pointDetails" class="point-details" hidden>
              <img id="detailPhoto" alt="" hidden>
              <dl>
                <div>
                  <dt id="detailTitleLabel">見出し</dt>
                  <dd id="detailTitle"></dd>
                </div>
                <div>
                  <dt id="detailCoordsLabel">緯度経度</dt>
                  <dd id="detailCoords"></dd>
                </div>
                <div>
                  <dt id="detailCreatedLabel">登録</dt>
                  <dd id="detailCreated"></dd>
                </div>
                <div>
                  <dt id="detailNoteLabel">コメント</dt>
                  <dd id="detailNote"></dd>
                </div>
              </dl>
              <div id="mapOpenActions" class="map-open-actions" aria-label="外部地図">
                <button id="openAppleMapsButton" type="button" data-i18n="button.appleMaps">Appleマップ</button>
                <button id="openGoogleMapsButton" type="button" data-i18n="button.googleMaps">Googleマップ</button>
              </div>
              <div id="targetActions" class="target-actions">
                <button id="targetPointButton" type="button" data-i18n="button.setTarget">ターゲットにする</button>
              </div>
            </div>
          </section>

          <section class="panel" data-mobile-panel="analysis">
            <h2 data-i18n="panel.analysis">分析</h2>
            <div class="metric-grid">
              <div>
                <span data-i18n="metric.points">地点</span>
                <strong id="pointCount">0</strong>
              </div>
              <div>
                <span data-i18n="metric.links">線</span>
                <strong id="linkCount">0</strong>
              </div>
              <div>
                <span data-i18n="metric.total">合計</span>
                <strong id="totalDistance">0 m</strong>
              </div>
              <div>
                <span data-i18n="metric.longest">最長</span>
                <strong id="longestDistance">0 m</strong>
              </div>
            </div>
            <div id="linkList" class="link-list"></div>
          </section>

          <section class="panel" data-mobile-panel="analysis">
            <div class="panel-heading">
              <h2 data-i18n="panel.route">巡回ルート</h2>
              <span id="routeSelectedCount" class="panel-count">0点</span>
            </div>
            <label class="route-start-label">
              <span data-i18n="route.startPoint">スタート地点</span>
              <select id="routeStartSelect"></select>
            </label>
            <label class="route-return-label">
              <input id="routeReturnToStart" type="checkbox">
              <span data-i18n="route.returnToStart">最後にスタート地点へ戻る</span>
            </label>
            <div class="button-row">
              <button id="computeRouteButton" type="button" data-i18n="button.optimize">最適順</button>
              <button id="clearRouteSelectionButton" type="button" data-i18n="button.clear">解除</button>
            </div>
            <div id="routeSummary" class="route-summary" data-i18n="route.summaryDefault">地点を選んで巡回を押す</div>
            <ol id="routeList" class="route-list"></ol>
          </section>
          <section class="panel data-panel" data-mobile-panel="data">
            <h2 data-i18n="panel.data">データ</h2>
            <div class="data-group">
              <h3 data-i18n="data.pointLists">地点リスト</h3>
              <div id="pointListItems" class="point-list-items" data-point-list-items></div>
              <div class="button-row">
                <button id="exportPointsButton" type="button" hidden data-i18n="button.save">保存</button>
                <button id="replacePointsButton" type="button" data-i18n="button.load">読込</button>
                <button id="appendPointsButton" type="button" hidden data-i18n="button.appendLoad">追加読込</button>
              </div>
            </div>
            <div class="data-group">
              <h3 data-i18n="data.observations">観察記録</h3>
              <div class="button-row">
                <button id="exportObservationButton" type="button" data-i18n="button.save">保存</button>
                <button id="replaceObservationButton" type="button" data-i18n="button.replaceLoad">新規読込</button>
                <button id="appendObservationButton" type="button" data-i18n="button.appendLoad">追加読込</button>
              </div>
            </div>
            <div class="data-group">
              <h3 data-i18n="data.grid">グリッド</h3>
              <div class="button-row">
                <button id="clearButton" class="danger-button" type="button" data-i18n="button.clearGrid">グリッド初期化</button>
              </div>
            </div>
            <input id="pointImportFile" type="file" accept="application/json,.json" multiple hidden>
            <input id="observationImportFile" type="file" accept="application/json,.json" multiple hidden>
          </section>
        </aside>
      </main>
    </div>
  </body>
</html>
