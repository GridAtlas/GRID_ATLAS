<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#e95f1a">
    <title>GRID ATLAS</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="src/styles.css?v=9">
    <script src="src/main.js?v=10" type="module" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-dot" aria-hidden="true"></span>
          <h1>GRID ATLAS</h1>
        </div>
        <div class="selected-summary selected-summary-mobile" aria-live="polite">
          <span>選択中</span>
          <strong id="mobileSelectedTitle">未選択</strong>
        </div>
        <nav class="actionbar" aria-label="選択地点の操作">
          <button id="actionRegisterButton" class="action-button" type="button" title="この場所を登録">
            <span aria-hidden="true">＋</span>
            <span>登録</span>
          </button>
          <button id="actionLinkButton" class="action-button" type="button" title="選択地点から線をつなぐ">
            <span aria-hidden="true">╱</span>
            <span>接続</span>
          </button>
          <button id="actionMeasureButton" class="action-button" type="button" title="選択地点から距離を測る">
            <span aria-hidden="true">↔</span>
            <span>計測</span>
          </button>
          <button id="actionRouteButton" class="action-button" type="button" title="巡回ルートに追加">
            <span aria-hidden="true">⤨</span>
            <span id="actionRouteLabel">巡回</span>
          </button>
        </nav>
      </header>

      <main class="workspace">
        <section class="grid-stage" aria-label="格子">
          <canvas id="gridCanvas" aria-label="地点格子"></canvas>
          <div class="canvas-tools" aria-label="表示操作">
            <button id="zoomInButton" class="icon-button" type="button" title="拡大">＋</button>
            <button id="zoomOutButton" class="icon-button" type="button" title="縮小">−</button>
            <button id="fitButton" class="icon-button" type="button" title="全体表示">□</button>
            <button id="originButton" class="icon-button" type="button" title="選択地点へ">⌾</button>
          </div>
          <output id="statusLine" class="status-line" aria-live="polite"></output>
        </section>

        <aside class="sidebar" aria-label="地点と分析">
          <div class="selected-summary selected-summary-sidebar" aria-live="polite">
            <span>選択中</span>
            <strong id="sidebarSelectedTitle">未選択</strong>
          </div>
          <section class="panel">
            <h2>地点登録</h2>
            <form id="pointForm" class="point-form">
              <label>
                <span>見出し</span>
                <input id="pointTitle" name="title" type="text" autocomplete="off" maxlength="80">
              </label>

              <div class="coordinate-fields">
                <label>
                  <span>緯度</span>
                  <input id="pointLat" name="lat" type="number" step="0.000001" inputmode="decimal" placeholder="35.681236">
                </label>
                <label>
                  <span>経度</span>
                  <input id="pointLng" name="lng" type="number" step="0.000001" inputmode="decimal" placeholder="139.767125">
                </label>
              </div>

              <div class="button-row">
                <button id="useCenterButton" type="button">画面中心</button>
                <button id="useLocationButton" type="button">現在地</button>
              </div>

              <label>
                <span>写真</span>
                <input id="pointPhoto" name="photo" type="file" accept="image/*" capture="environment">
              </label>

              <label>
                <span>コメント</span>
                <textarea id="pointNote" name="note" rows="4"></textarea>
              </label>

              <button class="primary-button" type="submit">登録</button>
            </form>
          </section>

          <section class="panel">
            <h2>共有から登録</h2>
            <div class="share-import">
              <label>
                <span>共有テキスト</span>
                <textarea id="shareInput" rows="3" autocomplete="off"></textarea>
              </label>
              <button id="parseShareButton" type="button">読み取り</button>
              <output id="shareImportStatus" class="share-import-status" aria-live="polite"></output>
            </div>
          </section>
          <section class="panel">
            <div class="panel-heading">
              <h2>選択地点</h2>
              <button id="deletePointButton" class="danger-button" type="button" hidden>削除</button>
            </div>
            <div id="emptyDetails" class="empty-state">未選択</div>
            <div id="pointDetails" class="point-details" hidden>
              <img id="detailPhoto" alt="" hidden>
              <dl>
                <div>
                  <dt>見出し</dt>
                  <dd id="detailTitle"></dd>
                </div>
                <div>
                  <dt>緯度経度</dt>
                  <dd id="detailCoords"></dd>
                </div>
                <div>
                  <dt>登録</dt>
                  <dd id="detailCreated"></dd>
                </div>
                <div>
                  <dt>コメント</dt>
                  <dd id="detailNote"></dd>
                </div>
              </dl>
              <div class="map-open-actions" aria-label="外部地図">
                <button id="openAppleMapsButton" type="button">Appleマップ</button>
                <button id="openGoogleMapsButton" type="button">Googleマップ</button>
              </div>
            </div>
          </section>

          <section class="panel">
            <h2>分析</h2>
            <div class="metric-grid">
              <div>
                <span>地点</span>
                <strong id="pointCount">0</strong>
              </div>
              <div>
                <span>線</span>
                <strong id="linkCount">0</strong>
              </div>
              <div>
                <span>合計</span>
                <strong id="totalDistance">0 m</strong>
              </div>
              <div>
                <span>最長</span>
                <strong id="longestDistance">0 m</strong>
              </div>
            </div>
            <div id="measureResult" class="measure-result">未計測</div>
            <div id="linkList" class="link-list"></div>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <h2>巡回ルート</h2>
              <span id="routeSelectedCount" class="panel-count">0点</span>
            </div>
            <label class="route-start-label">
              <span>スタート地点</span>
              <select id="routeStartSelect"></select>
            </label>
            <div class="button-row">
              <button id="computeRouteButton" type="button">最適順</button>
              <button id="clearRouteSelectionButton" type="button">解除</button>
            </div>
            <div id="routeSummary" class="route-summary">地点を選んで上部の巡回を押す</div>
            <ol id="routeList" class="route-list"></ol>
          </section>
          <section class="panel">
            <h2>データ</h2>
            <div class="button-row">
              <button id="exportButton" type="button">書き出し</button>
              <button id="importButton" type="button">読み込み</button>
              <button id="clearButton" class="danger-button" type="button">初期化</button>
            </div>
            <input id="importFile" type="file" accept="application/json,.json" hidden>
          </section>
        </aside>
      </main>
    </div>
  </body>
</html>
