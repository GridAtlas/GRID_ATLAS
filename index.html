<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#020806">
    <title>GRID ATLAS</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon-retro.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon-retro.png">
    <script>try{document.documentElement.dataset.theme=localStorage.getItem("grid-atlas-theme")==="light"?"light":"retro"}catch{document.documentElement.dataset.theme="retro"}</script>
    <link rel="stylesheet" href="src/styles.css?v=23">
    <script src="src/main.js?v=61" type="module" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-dot" aria-hidden="true"></span>
          <h1>GRID ATLAS</h1>
          <button id="themeToggleButton" class="theme-toggle" type="button" aria-pressed="true" title="通常表示へ">LIGHT</button>
        </div>
        <div class="selected-summary selected-summary-mobile" aria-live="polite">
          <span>選択中</span>
          <strong id="mobileSelectedTitle">未選択</strong>
        </div>
      </header>

      <main class="workspace">
        <div class="map-column">
          <div class="selection-info" aria-live="polite">
            <span>情報</span>
            <strong id="selectionInfoText">未選択</strong>
          </div>

          <section class="grid-stage" aria-label="格子">
            <canvas id="gridCanvas" aria-label="地点格子"></canvas>
            <div class="canvas-tools" aria-label="表示操作">
              <button id="zoomInButton" class="icon-button" type="button" title="拡大">＋</button>
              <button id="zoomOutButton" class="icon-button" type="button" title="縮小">−</button>
              <button id="fitButton" class="icon-button" type="button" title="全体表示">□</button>
              <button id="originButton" class="icon-button" type="button" title="選択地点へ">⌾</button>
            </div>
            <output id="statusLine" class="status-line" aria-live="polite"></output>
          </section>

          <nav class="actionbar" aria-label="地点操作">
            <button id="actionRegisterButton" class="action-button" type="button" title="この位置を登録" disabled>
              <span aria-hidden="true">＋</span>
              <span>登録</span>
            </button>
            <button id="actionLinkButton" class="action-button" type="button" title="選択中の2点を接続" disabled>
              <span aria-hidden="true">╱</span>
              <span>接続</span>
            </button>
            <button id="actionCenterButton" class="action-button" type="button" title="選択点の中心に仮ポイントを作成" disabled>
              <span aria-hidden="true">◇</span>
              <span>中心</span>
            </button>
            <button id="clearSelectionButton" class="action-button" type="button" title="選択を解除" disabled>
              <span aria-hidden="true">○</span>
              <span>解除</span>
            </button>
            <button id="actionRouteStartButton" class="action-button" type="button" title="選択地点を起点にする" disabled>
              <span aria-hidden="true">●</span>
              <span>起点</span>
            </button>
            <button id="actionTargetButton" class="action-button" type="button" title="選択地点を対象にする" disabled>
              <span aria-hidden="true">◎</span>
              <span>対象</span>
            </button>
            <button id="actionFollowButton" class="action-button" type="button" aria-pressed="false" title="現在地追従を切り替え">
              <span aria-hidden="true">⌾</span>
              <span>追従</span>
            </button>
            <button id="actionRouteButton" class="action-button" type="button" title="選択点を巡回対象にする" disabled>
              <span aria-hidden="true">⤨</span>
              <span id="actionRouteLabel">巡回</span>
            </button>
            <button id="deletePointButton" class="action-button danger-button" type="button" title="選択対象を削除" disabled>
              <span aria-hidden="true">×</span>
              <span>削除</span>
            </button>
            <button id="actionRestoreButton" class="action-button" type="button" title="直前の削除を復旧" disabled>
              <span aria-hidden="true">↶</span>
              <span>復旧</span>
            </button>
            <button id="actionEditButton" class="action-button" type="button" title="選択地点を編集" disabled>
              <span aria-hidden="true">✎</span>
              <span>編集</span>
            </button>
            <button id="actionMapButton" class="action-button" type="button" title="選択地点を地図で開く" disabled>
              <span aria-hidden="true">↗</span>
              <span>地図</span>
            </button>
          </nav>
        </div>

        <aside class="sidebar" aria-label="地点と分析">
          <div class="selected-summary selected-summary-sidebar" aria-live="polite">
            <span>選択中</span>
            <strong id="sidebarSelectedTitle">未選択</strong>
          </div>
          <section class="panel">
            <h2>地点登録</h2>
            <form id="pointForm" class="point-form">
              <label>
                <span>見出し</span>
                <input id="pointTitle" name="title" type="text" autocomplete="off" maxlength="80">
              </label>

              <div class="coordinate-fields">
                <label>
                  <span>緯度</span>
                  <input id="pointLat" name="lat" type="number" step="0.000001" inputmode="decimal" placeholder="35.681236">
                </label>
                <label>
                  <span>経度</span>
                  <input id="pointLng" name="lng" type="number" step="0.000001" inputmode="decimal" placeholder="139.767125">
                </label>
              </div>

              <div class="button-row">
                <button id="readClipboardButton" type="button">クリップ読取</button>
                <button id="useLocationButton" type="button" aria-pressed="false" title="現在地を登録フォームへ入力">現在地</button>
              </div>
              <output id="shareImportStatus" class="form-status" aria-live="polite"></output>

              <label>
                <span>写真</span>
                <input id="pointPhoto" name="photo" type="file" accept="image/*" capture="environment">
              </label>

              <label>
                <span>コメント</span>
                <textarea id="pointNote" name="note" rows="4"></textarea>
              </label>

              <button id="pointSubmitButton" class="primary-button" type="submit">登録</button>
            </form>
          </section>
          <section class="panel">
            <div class="panel-heading">
              <h2 id="selectionHeading">選択地点</h2>
            </div>
            <div id="emptyDetails" class="empty-state">未選択</div>
            <div id="pointDetails" class="point-details" hidden>
              <img id="detailPhoto" alt="" hidden>
              <dl>
                <div>
                  <dt id="detailTitleLabel">見出し</dt>
                  <dd id="detailTitle"></dd>
                </div>
                <div>
                  <dt id="detailCoordsLabel">緯度経度</dt>
                  <dd id="detailCoords"></dd>
                </div>
                <div>
                  <dt id="detailCreatedLabel">登録</dt>
                  <dd id="detailCreated"></dd>
                </div>
                <div>
                  <dt id="detailNoteLabel">コメント</dt>
                  <dd id="detailNote"></dd>
                </div>
              </dl>
              <div id="mapOpenActions" class="map-open-actions" aria-label="外部地図">
                <button id="openAppleMapsButton" type="button">Appleマップ</button>
                <button id="openGoogleMapsButton" type="button">Googleマップ</button>
              </div>
              <div id="targetActions" class="target-actions">
                <button id="targetPointButton" type="button">ターゲットにする</button>
              </div>
            </div>
          </section>

          <section class="panel">
            <h2>分析</h2>
            <div class="metric-grid">
              <div>
                <span>地点</span>
                <strong id="pointCount">0</strong>
              </div>
              <div>
                <span>線</span>
                <strong id="linkCount">0</strong>
              </div>
              <div>
                <span>合計</span>
                <strong id="totalDistance">0 m</strong>
              </div>
              <div>
                <span>最長</span>
                <strong id="longestDistance">0 m</strong>
              </div>
            </div>
            <div id="linkList" class="link-list"></div>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <h2>巡回ルート</h2>
              <span id="routeSelectedCount" class="panel-count">0点</span>
            </div>
            <label class="route-start-label">
              <span>スタート地点</span>
              <select id="routeStartSelect"></select>
            </label>
            <label class="route-return-label">
              <input id="routeReturnToStart" type="checkbox">
              <span>最後にスタート地点へ戻る</span>
            </label>
            <div class="button-row">
              <button id="computeRouteButton" type="button">最適順</button>
              <button id="clearRouteSelectionButton" type="button">解除</button>
            </div>
            <div id="routeSummary" class="route-summary">地点を選んで巡回を押す</div>
            <ol id="routeList" class="route-list"></ol>
          </section>
          <section class="panel data-panel">
            <h2>データ</h2>
            <div class="data-group">
              <h3>地点リスト</h3>
              <div class="button-row">
                <button id="exportPointsButton" type="button">保存</button>
                <button id="replacePointsButton" type="button">新規読込</button>
                <button id="appendPointsButton" type="button">追加読込</button>
              </div>
            </div>
            <div class="data-group">
              <h3>観察記録</h3>
              <div class="button-row">
                <button id="exportObservationButton" type="button">保存</button>
                <button id="replaceObservationButton" type="button">新規読込</button>
                <button id="appendObservationButton" type="button">追加読込</button>
              </div>
            </div>
            <div class="data-group">
              <h3>グリッド</h3>
              <div class="button-row">
                <button id="clearButton" class="danger-button" type="button">グリッド初期化</button>
              </div>
            </div>
            <input id="pointImportFile" type="file" accept="application/json,.json" multiple hidden>
            <input id="observationImportFile" type="file" accept="application/json,.json" multiple hidden>
          </section>
        </aside>
      </main>
    </div>
  </body>
</html>
